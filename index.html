<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>RepTracker — NYC & Chicago</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Barlow:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{--ink:#0e0e0c;--paper:#f5f2eb;--card:#fdfcf8;--rule:#d6d1c4;--accent:#c0392b;--accent2:#1a3a5c;--muted:#7a7568;--tag-bg:#e8e3d8;--pass:#1a5c2a;--pass-bg:#d4f0dc;--pend:#6b4c00;--pend-bg:#fdf0c2;--up:#1a3a5c;--up-bg:#d6e8f8;--no:#8c1c1c;--no-bg:#f5d5d5;--yes:#1a5c2a;--yes-bg:#d4f0dc;--abs:#6b4c00;--abs-bg:#fdf0c2;--intro:#3a3a8c;--intro-bg:#e0e0f8;--act:#5c3a1a;--act-bg:#f5e8d6}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px}
body{background:var(--paper);color:var(--ink);font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh}
.masthead{border-bottom:3px double var(--rule);padding:1.5rem 2rem 1.2rem;display:flex;justify-content:space-between;align-items:end;flex-wrap:wrap;gap:1rem}
.masthead-title{font-family:'Libre Baskerville',serif;font-size:1.8rem;letter-spacing:-.02em;line-height:1}
.masthead-title span{color:var(--accent)}
.masthead-sub{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.12em;margin-top:4px}
.masthead-date{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.wrap{max-width:960px;margin:0 auto;padding:0 1.5rem 4rem}
.search-panel{border-bottom:1px solid var(--rule);padding:1.25rem 0;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.city-tabs{display:flex;border:1px solid var(--rule);border-radius:3px;overflow:hidden}
.city-tab{padding:6px 18px;font-family:'DM Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.08em;cursor:pointer;border:none;background:var(--card);color:var(--muted);transition:background .15s,color .15s}
.city-tab.active{background:var(--ink);color:white}
.search-select{flex:1;min-width:200px;padding:8px 12px;border:1px solid var(--rule);border-radius:3px;background:var(--card);font-family:'Barlow',sans-serif;font-size:.875rem;color:var(--ink);cursor:pointer}
.search-select:focus{outline:2px solid var(--accent2);outline-offset:1px}
.btn-go{padding:8px 22px;background:var(--ink);color:white;border:none;border-radius:3px;font-family:'DM Mono',monospace;font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;white-space:nowrap}
.btn-go:hover{background:var(--accent2)}
.btn-go:disabled{opacity:.35;cursor:not-allowed}
.status-bar{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);padding:6px 0;border-bottom:1px solid var(--rule);display:flex;gap:1.5rem;flex-wrap:wrap;letter-spacing:.04em}
.status-item{display:flex;align-items:center;gap:4px}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-ok{background:#2ecc71}.dot-err{background:var(--accent)}.dot-wait{background:#ccc;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.rep-bar{display:flex;align-items:center;gap:1.25rem;padding:1.5rem 0 1.25rem;border-bottom:2px solid var(--ink);flex-wrap:wrap}
.rep-initial{width:52px;height:52px;border:2px solid var(--ink);display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',serif;font-size:1.2rem;font-weight:700;flex-shrink:0}
.rep-info{flex:1;min-width:200px}
.rep-name{font-family:'Libre Baskerville',serif;font-size:1.4rem;font-weight:700;line-height:1.1}
.rep-sub{font-family:'DM Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-top:4px}
.rep-stats{display:flex;gap:1.5rem;text-align:center}
.stat-n{font-family:'Libre Baskerville',serif;font-size:1.8rem;font-weight:700;line-height:1;color:var(--accent2)}
.stat-l{font-family:'DM Mono',monospace;font-size:.58rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-top:3px}
.grid2{display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--rule)}
.col{border-right:1px solid var(--rule)}.col:last-child{border-right:none}
.col-head{font-family:'DM Mono',monospace;font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:.8rem 1rem .5rem;border-bottom:1px solid var(--rule);display:flex;justify-content:space-between;align-items:center}
.col-count{background:var(--tag-bg);padding:1px 7px;border-radius:10px;font-size:.58rem}
.fullrow{border-top:1px solid var(--rule)}
.tag-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:.8rem 1rem}
.tag{padding:4px 10px;border:1px solid var(--rule);border-radius:2px;font-size:.75rem;background:var(--card)}
.tag-role{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);text-transform:uppercase;margin-left:5px}
.row{padding:.7rem 1rem;border-bottom:1px solid var(--rule);transition:background .1s;cursor:pointer}
.row:hover{background:#f0ece3}
.row:last-child{border-bottom:none}
.row-id{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);letter-spacing:.04em;margin-bottom:2px}
.row-title{font-size:.82rem;line-height:1.4}
.row-date{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);margin-top:4px}
.pill{display:inline-block;padding:1px 6px;border-radius:2px;font-family:'DM Mono',monospace;font-size:.58rem;font-weight:500;text-transform:uppercase;letter-spacing:.04em;margin-left:5px;vertical-align:middle}
.pill-pass{background:var(--pass-bg);color:var(--pass)}
.pill-pend{background:var(--pend-bg);color:var(--pend)}
.pill-yes{background:var(--yes-bg);color:var(--yes)}
.pill-no{background:var(--no-bg);color:var(--no)}
.pill-intro{background:var(--intro-bg);color:var(--intro)}
.pill-action{background:var(--act-bg);color:var(--act)}
.pill-abs{background:var(--abs-bg);color:var(--abs)}
/* Activity feed row */
.act-row{padding:.6rem 1rem;border-bottom:1px solid var(--rule);display:grid;grid-template-columns:52px 1fr;gap:.5rem;align-items:start;transition:background .1s}
.act-row:hover{background:#f0ece3}
.act-row:last-child{border-bottom:none}
.act-type{font-family:'DM Mono',monospace;font-size:.6rem;font-weight:500;text-transform:uppercase;letter-spacing:.04em;padding:3px 6px;border-radius:2px;text-align:center;line-height:1.2;white-space:nowrap}
.act-type.sponsor{background:var(--intro-bg);color:var(--intro)}
.act-type.action{background:var(--act-bg);color:var(--act)}
.act-type.vote-y{background:var(--yes-bg);color:var(--yes)}
.act-type.vote-n{background:var(--no-bg);color:var(--no)}
.act-type.vote-o{background:var(--abs-bg);color:var(--abs)}
.act-type.status{background:var(--pend-bg);color:var(--pend)}
.act-title{font-size:.8rem;line-height:1.4}
.act-meta{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);margin-top:2px}
.empty{padding:2rem 1rem;font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.loading-box{padding:3rem;text-align:center}
.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--rule);border-top-color:var(--ink);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.load-text{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-top:10px}
.bill-detail{background:var(--tag-bg);padding:.6rem 1rem;border-bottom:1px solid var(--rule);font-size:.78rem;line-height:1.6;animation:slideDown .15s ease-out}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:600px}}
.bill-detail-title{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem}
.action-row{display:flex;gap:.75rem;padding:3px 0;border-bottom:1px dashed var(--rule)}
.action-row:last-child{border-bottom:none}
.action-date{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);min-width:80px;flex-shrink:0}
.action-desc{font-size:.78rem}
.action-link{display:inline-block;margin-top:.4rem;font-family:'DM Mono',monospace;font-size:.6rem;color:var(--accent2);text-decoration:none;letter-spacing:.04em}
.action-link:hover{text-decoration:underline}
.foot-note{padding:.75rem 0;font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted);letter-spacing:.06em}
.foot-note a{color:var(--muted)}
@media(max-width:640px){
  .masthead{padding:1rem}.wrap{padding:0 1rem 3rem}
  .grid2{grid-template-columns:1fr}.col{border-right:none;border-bottom:1px solid var(--rule)}
  .rep-stats{display:none}.search-panel{gap:.5rem}
}
</style>
</head>
<body>
<div class="masthead">
  <div>
    <div class="masthead-title">Rep<span>Tracker</span></div>
    <div class="masthead-sub">NYC &amp; Chicago · What did my rep do this week?</div>
  </div>
  <div class="masthead-date" id="today"></div>
</div>
<div class="wrap">
  <div class="search-panel">
    <div class="city-tabs">
      <button class="city-tab active" onclick="switchCity('nyc')" id="tab-nyc">NYC</button>
      <button class="city-tab" onclick="switchCity('chi')" id="tab-chi">Chicago</button>
    </div>
    <select class="search-select" id="sel" onchange="document.getElementById('go').disabled=!this.value">
      <option value="">Loading…</option>
    </select>
    <button class="btn-go" id="go" disabled onclick="go()">View →</button>
  </div>
  <div class="status-bar" id="statusbar"></div>
  <div id="result"></div>
</div>
<script>
const NYC_MEMBERS='https://data.cityofnewyork.us/resource/uvw5-9znb.json?$limit=200';
const NYC_COMMITTEES='https://data.cityofnewyork.us/resource/aabe-yfm9.json?$limit=5000';
const NYC_BILLS='https://data.cityofnewyork.us/resource/6ctv-n46c.json?$limit=500&$order=intro_date%20DESC';
const CHI='https://puddle.datamade.us/chicago_council';
let city='nyc';
let D={nyc_members:[],nyc_committees:[],nyc_bills:[],chi_persons:[]};
window._billData=[];
document.getElementById('today').textContent=new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});

function findField(o,...h){if(!o)return null;const k=Object.keys(o);for(const x of h){const m=k.find(i=>i.toLowerCase()===x.toLowerCase());if(m)return m;}for(const x of h){const xl=x.toLowerCase();const m=k.find(i=>i.toLowerCase().includes(xl));if(m)return m;}return null;}
function getField(o,...h){const k=findField(o,...h);return k?o[k]:null;}
function personName(r){return r.name||getField(r,'full_name','person_name','member_name')||'Unknown';}
function personDistrict(r){return r.district||getField(r,'ward','seat')||'';}
function committeeName(r){return getField(r,'committee_name','committee','body_name')||'Committee';}
function committeeRole(r){return getField(r,'role','title','position')||'Member';}

async function boot(){
  const tests=[
    {id:'nyc-members',label:'NYC members',fn:()=>jfetch(NYC_MEMBERS)},
    {id:'nyc-committees',label:'NYC committees',fn:()=>jfetch(NYC_COMMITTEES)},
    {id:'nyc-bills',label:'NYC bills',fn:()=>jfetch(NYC_BILLS)},
    {id:'chi-persons',label:'CHI persons',fn:()=>loadChiPersons()},
    {id:'chi-data',label:'CHI activity',fn:()=>chiSQL(`SELECT COUNT(*) as n FROM billaction LIMIT 1`)},
  ];
  const bar=document.getElementById('statusbar');
  bar.innerHTML=tests.map(t=>`<span class="status-item"><span class="dot dot-wait" id="dot-${t.id}"></span>${t.label}</span>`).join('');
  const R=await Promise.allSettled(tests.map(t=>t.fn()));
  R.forEach((r,i)=>{document.getElementById('dot-'+tests[i].id).className='dot dot-'+(r.status==='fulfilled'&&r.value&&(Array.isArray(r.value)?r.value.length>0:true)?'ok':'err');});
  D.nyc_members=R[0].status==='fulfilled'?R[0].value:[];
  D.nyc_committees=R[1].status==='fulfilled'?R[1].value:[];
  D.nyc_bills=R[2].status==='fulfilled'?R[2].value:[];
  D.chi_persons=R[3].status==='fulfilled'?R[3].value:[];
  if(city==='nyc')fillNYC();else fillChi();
}

async function loadChiPersons(){
  const qs=[
    `SELECT DISTINCT p.id,p.name,po.label as ward FROM person p JOIN membership m ON m.person_id=p.id JOIN post po ON m.post_id=po.id WHERE po.label LIKE '%Ward%' AND p.name IS NOT NULL AND(m.end_date IS NULL OR m.end_date='' OR m.end_date>=date('now')) ORDER BY po.label LIMIT 60`,
    `SELECT DISTINCT p.id,p.name FROM person p JOIN membership m ON m.person_id=p.id JOIN organization o ON o.id=m.organization_id WHERE o.name LIKE '%Council%' AND p.name IS NOT NULL AND(m.end_date IS NULL OR m.end_date='' OR m.end_date>=date('now')) ORDER BY p.name LIMIT 60`,
    `SELECT id,name FROM person WHERE name IS NOT NULL ORDER BY name LIMIT 80`
  ];
  for(const sql of qs){try{const d=await chiSQL(sql);if(d&&d.length>0)return d;}catch(e){}}
  return [];
}

function fillNYC(){
  const sel=document.getElementById('sel');
  if(!D.nyc_members.length){sel.innerHTML='<option value="">NYC data unavailable</option>';return;}
  const now=new Date();
  const cur=D.nyc_members.filter(m=>{if(personName(m)==='Unknown')return false;const s=m.term_start?new Date(m.term_start):null;const e=m.term_end?new Date(m.term_end):null;if(s&&e)return s<=now&&now<=e;if(s&&!e)return s<=now;return false;});
  const bd=new Map();cur.forEach(m=>{const d=personDistrict(m)||personName(m);if(!bd.has(d)||(m.term_start>(bd.get(d).term_start||'')))bd.set(d,m);});
  const sorted=[...bd.values()].sort((a,b)=>(parseInt(personDistrict(a))||999)-(parseInt(personDistrict(b))||999));
  sel.innerHTML='<option value="">— Select your council member —</option>';
  sorted.forEach((m,i)=>{const o=document.createElement('option');o.value=i;const d=personDistrict(m);o.textContent=(d?'District '+d+'  ·  ':'')+personName(m);sel.appendChild(o);});
  D._nyc_sorted=sorted;
}
function fillChi(){
  const sel=document.getElementById('sel');
  if(!D.chi_persons.length){sel.innerHTML='<option value="">Chicago data unavailable</option>';return;}
  const ww=D.chi_persons.map(p=>{let wn=null;if(p.ward){const m=String(p.ward).match(/(\d+)/);if(m)wn=parseInt(m[1]);}return{...p,_wardNum:wn};});
  const seen=new Map();ww.forEach(p=>{if(!p.id||!p.name)return;if(!seen.has(p.id)||(p._wardNum&&!seen.get(p.id)._wardNum))seen.set(p.id,p);});
  const dd=[...seen.values()].sort((a,b)=>(a._wardNum||999)-(b._wardNum||999));
  sel.innerHTML='<option value="">— Select your alder —</option>';
  dd.forEach((p,i)=>{const o=document.createElement('option');o.value=i;o.textContent=(p._wardNum?'Ward '+p._wardNum+'  ·  ':'')+p.name;sel.appendChild(o);});
  D._chi_sorted=dd;
}
function switchCity(c){city=c;document.getElementById('tab-nyc').classList.toggle('active',c==='nyc');document.getElementById('tab-chi').classList.toggle('active',c==='chi');document.getElementById('result').innerHTML='';document.getElementById('go').disabled=true;if(c==='nyc')fillNYC();else fillChi();}
function go(){if(city==='nyc')showNYC();else showChi();}

// ══════════════════════════════════════════════════
// NYC VIEW
// ══════════════════════════════════════════════════
async function showNYC(){
  const idx=+document.getElementById('sel').value;
  const member=D._nyc_sorted[idx];if(!member)return;
  const name=personName(member),district=personDistrict(member);

  document.getElementById('result').innerHTML=`<div class="loading-box"><div class="spin"></div><div class="load-text">Loading ${name}…</div></div>`;

  const lastName=name.split(' ').pop().toLowerCase();
  let myComms=D.nyc_committees.filter(c=>{const vals=Object.values(c).map(v=>String(v).toLowerCase());return vals.some(v=>v.includes(lastName));});
  if(myComms.length===0&&district)myComms=D.nyc_committees.filter(c=>{const vals=Object.values(c).map(v=>String(v));return vals.some(v=>v===String(district));});
  const commMap=new Map();myComms.forEach(c=>{const cn=committeeName(c);if(!commMap.has(cn))commMap.set(cn,committeeRole(c));});

  const sponsorBills=D.nyc_bills.filter(b=>(b.primary_sponsor||'').toLowerCase().includes(lastName));

  // Build activity feed from bill data (intro, committee hearing, passed, enacted, vetoed)
  const activity=[];
  sponsorBills.forEach(b=>{
    if(b.intro_date) activity.push({date:b.intro_date, type:'intro', label:'Introduced', title:b.title||b.name||'', id:b.file_number, data:b});
    if(b.agenda_date&&b.agenda_date!==b.intro_date) activity.push({date:b.agenda_date, type:'action', label:'Agenda', title:(b.title||b.name||'')+(b.committee?' — '+b.committee:''), id:b.file_number, data:b});
    if(b.passed_date) activity.push({date:b.passed_date, type:'passed', label:'Passed', title:b.title||b.name||'', id:b.file_number, data:b});
    if(b.enacted_date) activity.push({date:b.enacted_date, type:'enacted', label:'Enacted', title:b.title||b.name||'', id:b.file_number, data:b});
  });
  activity.sort((a,b)=>new Date(b.date)-new Date(a.date));

  window._billData=[];
  let html='';
  html+=repHeader(name,`NYC Council Member · District ${district}`,
    [[commMap.size,'Committees'],[sponsorBills.length,'Bills'],[activity.length,'Activities']]);

  if(commMap.size>0){
    html+=`<div class="fullrow"><div class="col-head">Committee memberships <span class="col-count">${commMap.size}</span></div><div class="tag-wrap">`;
    commMap.forEach((role,cn)=>{html+=`<span class="tag">${cn}<span class="tag-role">${role}</span></span>`;});
    html+=`</div></div>`;
  }

  html+=`<div class="grid2">`;

  // Left: legislation
  html+=`<div class="col"><div class="col-head">Legislation sponsored <span class="col-count">${sponsorBills.length}</span></div>`;
  if(!sponsorBills.length)html+=`<div class="empty">No legislation found</div>`;
  else sponsorBills.slice(0,20).forEach(b=>{
    const st=b.status||'Filed';const pc=statusPill(st);
    const bi=window._billData.length;
    window._billData.push({id:b.matter_id,identifier:b.file_number,city:'nyc',data:b});
    html+=`<div class="row" onclick="toggleBillDetail(this,${bi})"><div class="row-id">${b.file_number||'—'}<span class="pill ${pc.c}">${pc.t}</span></div><div class="row-title">${(b.title||b.name||'').slice(0,200)}</div><div class="row-date">Intro: ${fmtDate(b.intro_date)} ${b.committee?'· '+b.committee:''}</div></div>`;
  });
  html+=`</div>`;

  // Right: activity timeline
  html+=`<div class="col"><div class="col-head">Activity timeline <span class="col-count">${activity.length}</span></div>`;
  if(!activity.length)html+=`<div class="empty">No recent activity</div>`;
  else activity.slice(0,30).forEach(a=>{
    const cls=a.type==='intro'?'sponsor':a.type==='passed'||a.type==='enacted'?'vote-y':'action';
    html+=`<div class="act-row"><div class="act-type ${cls}">${a.label}</div><div><div class="act-title">${(a.title||'').slice(0,160)}</div><div class="act-meta">${fmtDate(a.date)} · ${a.id||''}</div></div></div>`;
  });
  html+=`</div></div>`;

  html+=`<div class="foot-note">DATA: <a href="https://data.cityofnewyork.us" target="_blank">NYC OPEN DATA</a> · <a href="https://legistar.council.nyc.gov" target="_blank">LEGISTAR</a></div>`;
  document.getElementById('result').innerHTML=html;
}

// ══════════════════════════════════════════════════
// CHICAGO VIEW
// ══════════════════════════════════════════════════
async function showChi(){
  const idx=+document.getElementById('sel').value;
  const person=D._chi_sorted[idx];if(!person)return;
  const personId=person.id,name=person.name||'Unknown',wardNum=person._wardNum;

  document.getElementById('result').innerHTML=`<div class="loading-box"><div class="spin"></div><div class="load-text">Loading ${name}…</div></div>`;

  // Fetch bills, bill actions on their bills, votes, sponsorships, and committees in parallel
  const [billsR,actionsR,votesR,commsR]=await Promise.allSettled([
    chiSQL(`SELECT b.id,b.identifier,b.title,b.classification,b.updated_at,b.created_at FROM bill b JOIN billsponsorship bs ON bs.bill_id=b.id WHERE bs.person_id='${personId}' ORDER BY b.updated_at DESC LIMIT 40`),
    chiSQL(`SELECT ba.description,ba.date,ba.classification as action_type,b.identifier,b.title FROM billaction ba JOIN bill b ON b.id=ba.bill_id JOIN billsponsorship bs ON bs.bill_id=b.id WHERE bs.person_id='${personId}' AND ba.date>=date('now','-120 days') ORDER BY ba.date DESC LIMIT 40`),
    loadChiVotes(personId),
    chiSQL(`SELECT DISTINCT o.name,m.role FROM membership m JOIN organization o ON o.id=m.organization_id WHERE m.person_id='${personId}' LIMIT 25`)
  ]);

  const bills=billsR.status==='fulfilled'?billsR.value:[];
  const actions=actionsR.status==='fulfilled'?actionsR.value:[];
  const votes=votesR.status==='fulfilled'?votesR.value:[];
  const comms=(commsR.status==='fulfilled'?commsR.value:[]).filter(c=>c.name&&!c.name.match(/^City Council$/i));

  // Build unified activity feed
  const activity=[];

  // Sponsorships — when they introduced/co-sponsored
  bills.forEach(b=>{
    if(b.created_at) activity.push({date:b.created_at, type:'sponsor', label:'Sponsored', title:b.title||'', id:b.identifier, billId:b.id});
  });

  // Bill actions — committee referrals, hearings, passages on their bills
  actions.forEach(a=>{
    activity.push({date:a.date, type:'action', label:a.description?a.description.slice(0,20):'Action', title:(a.title||''), id:a.identifier, desc:a.description});
  });

  // Votes — how they voted on contested items
  votes.forEach(v=>{
    const opt=(v.option||'').toLowerCase();
    const label=opt.includes('yes')||opt.includes('aye')?'Voted Yes':opt.includes('no')||opt.includes('nay')?'Voted No':'Vote';
    activity.push({date:v.start_date, type:opt.includes('yes')||opt.includes('aye')?'vote-y':opt.includes('no')||opt.includes('nay')?'vote-n':'vote-o', label, title:v.bill_title||v.motion_text||'', id:v.bill_id||''});
  });

  // Sort by date descending
  activity.sort((a,b)=>{
    const da=a.date?new Date(a.date):new Date(0);
    const db=b.date?new Date(b.date):new Date(0);
    return db-da;
  });

  // Dedup: remove actions with same date+id+label
  const seen=new Set();
  const dedupedActivity=activity.filter(a=>{
    const key=(a.date||'').slice(0,10)+'|'+(a.id||'')+'|'+a.label;
    if(seen.has(key))return false;seen.add(key);return true;
  });

  const now=new Date(),ago30=new Date(now-30*864e5);
  const recentBills=bills.filter(b=>b.updated_at&&new Date(b.updated_at)>ago30);
  const showBills=recentBills.length>0?recentBills:bills.slice(0,12);
  const billLabel=recentBills.length>0?'Legislation (last 30 days)':'Legislation on record';

  window._billData=[];
  let html='';
  const subtitle='Chicago Alder'+(wardNum?' · Ward '+wardNum:'')+' · City Council';
  html+=repHeader(name,subtitle,
    [[bills.length,'Bills'],[dedupedActivity.length,'Activities'],[comms.length,'Committees']]);

  if(comms.length>0){
    html+=`<div class="fullrow"><div class="col-head">Committee memberships <span class="col-count">${comms.length}</span></div><div class="tag-wrap">`;
    comms.forEach(c=>{html+=`<span class="tag">${c.name}<span class="tag-role">${c.role||'Member'}</span></span>`;});
    html+=`</div></div>`;
  }

  html+=`<div class="grid2">`;

  // Left: bills
  html+=`<div class="col"><div class="col-head">${billLabel} <span class="col-count">${showBills.length}</span></div>`;
  if(!showBills.length)html+=`<div class="empty">No legislation found</div>`;
  else showBills.forEach(b=>{
    const pc=statusPill(b.classification);
    const bi=window._billData.length;
    window._billData.push({id:b.id,identifier:b.identifier,city:'chi'});
    html+=`<div class="row" onclick="toggleBillDetail(this,${bi})"><div class="row-id">${b.identifier||'—'}<span class="pill ${pc.c}">${pc.t}</span></div><div class="row-title">${(b.title||'').slice(0,200)}</div><div class="row-date">${fmtDate(b.updated_at)}</div></div>`;
  });
  html+=`</div>`;

  // Right: unified activity feed
  html+=`<div class="col"><div class="col-head">Activity timeline <span class="col-count">${dedupedActivity.length}</span></div>`;
  if(!dedupedActivity.length)html+=`<div class="empty">No recent activity found</div>`;
  else dedupedActivity.slice(0,35).forEach(a=>{
    const cls=a.type==='sponsor'?'sponsor':a.type==='vote-y'?'vote-y':a.type==='vote-n'?'vote-n':a.type==='vote-o'?'vote-o':'action';
    html+=`<div class="act-row"><div class="act-type ${cls}">${a.label}</div><div><div class="act-title">${(a.title||'').slice(0,160)}</div><div class="act-meta">${fmtDate(a.date)}${a.id?' · '+a.id:''}${a.desc?' — '+a.desc.slice(0,80):''}</div></div></div>`;
  });
  html+=`</div></div>`;

  html+=`<div class="foot-note">DATA: <a href="https://chicago.councilmatic.org" target="_blank">CHICAGO COUNCILMATIC</a> · <a href="https://puddle.datamade.us/chicago_council" target="_blank">DATAMADE</a></div>`;
  document.getElementById('result').innerHTML=html;
}

// ══ CHICAGO VOTE LOADER ══
async function loadChiVotes(personId){
  const qs=[
    `SELECT pv.option,ve.motion_text,ve.start_date,ve.result,b.identifier as bill_id,b.title as bill_title FROM personvote pv JOIN voteevent ve ON ve.id=pv.vote_event_id LEFT JOIN bill b ON ve.bill_id=b.id WHERE pv.voter_id='${personId}' ORDER BY ve.start_date DESC LIMIT 30`,
    `SELECT pv.option,ve.motion_text,ve.start_date,ve.result,b.identifier as bill_id,b.title as bill_title FROM personvote pv JOIN voteevent ve ON ve.id=pv.vote_event_id LEFT JOIN bill b ON ve.bill_id=b.id WHERE pv.person_id='${personId}' ORDER BY ve.start_date DESC LIMIT 30`,
    `SELECT * FROM personvote WHERE voter_id='${personId}' LIMIT 5`,
    `SELECT * FROM personvote WHERE person_id='${personId}' LIMIT 5`,
  ];
  for(const sql of qs){try{const d=await chiSQL(sql);if(d&&d.length>0){console.log('CHI votes:',d.length,d[0]);return d;}}catch(e){}}
  try{const s=await chiSQL(`SELECT sql FROM sqlite_master WHERE name='personvote'`);console.log('personvote schema:',s);}catch(e){}
  return [];
}

// ══ BILL DETAIL ══
async function toggleBillDetail(rowEl,billIdx){
  const existing=rowEl.nextElementSibling;
  if(existing&&existing.classList.contains('bill-detail')){existing.remove();return;}
  document.querySelectorAll('.bill-detail').forEach(el=>el.remove());
  const bd=window._billData[billIdx];if(!bd)return;
  const panel=document.createElement('div');panel.className='bill-detail';
  panel.innerHTML='<div class="bill-detail-title">Loading…</div>';
  rowEl.after(panel);
  if(bd.city==='chi'&&bd.id){
    try{
      const eid=bd.id.replace(/'/g,"''");
      const actions=await chiSQL(`SELECT ba.description,ba.date,ba.classification,ba."order" FROM billaction ba WHERE ba.bill_id='${eid}' ORDER BY ba."order" ASC,ba.date ASC LIMIT 20`);
      let inner=`<div class="bill-detail-title">Action history — ${bd.identifier||''}</div>`;
      if(!actions.length)inner+='<div style="color:var(--muted);font-size:.75rem;">No action history found.</div>';
      else actions.forEach(a=>{inner+=`<div class="action-row"><div class="action-date">${fmtDate(a.date)}</div><div class="action-desc">${a.description||a.classification||'Action'}</div></div>`;});
      const slug=(bd.identifier||'').replace(/\s+/g,'-').toLowerCase();
      inner+=`<a class="action-link" href="https://chicago.councilmatic.org/legislation/${slug}/" target="_blank">View on Councilmatic →</a>`;
      panel.innerHTML=inner;
    }catch(e){panel.innerHTML=`<div class="bill-detail-title">Error</div><div style="font-size:.75rem;color:var(--accent);">${e.message}</div>`;}
  }else{
    const b=bd.data||{};
    let inner=`<div class="bill-detail-title">Bill details — ${bd.identifier||b.file_number||''}</div>`;
    [['Status',b.status],['Introduced',fmtDate(b.intro_date)],['Committee',b.committee],['Passed',fmtDate(b.passed_date)],['Enacted',fmtDate(b.enacted_date)],['Local law',b.local_law_number]]
      .filter(([,v])=>v&&v!=='—'&&v!=='NA').forEach(([l,v])=>{inner+=`<div class="action-row"><div class="action-date">${l}</div><div class="action-desc">${v}</div></div>`;});
    if(b.summary&&b.summary!=='NA')inner+=`<div style="margin-top:.5rem;font-size:.78rem;color:#555;font-style:italic;">${b.summary}</div>`;
    inner+=`<a class="action-link" href="https://legistar.council.nyc.gov/LegislationDetail.aspx?ID=${b.matter_id||''}&GUID=0" target="_blank">View on Legistar →</a>`;
    panel.innerHTML=inner;
  }
}

// ══ SHARED ══
function repHeader(n,sub,stats){return `<div class="rep-bar"><div class="rep-initial">${initials(n)}</div><div class="rep-info"><div class="rep-name">${n}</div><div class="rep-sub">${sub}</div></div><div class="rep-stats">${stats.map(([v,l])=>`<div><div class="stat-n">${v}</div><div class="stat-l">${l}</div></div>`).join('')}</div></div>`;}
function statusPill(c){const s=(c||'').toLowerCase();if(s.includes('pass')||s.includes('enact')||s.includes('approv'))return{c:'pill-pass',t:c};return{c:'pill-pend',t:c||'Filed'};}
async function jfetch(u){const r=await fetch(u);if(!r.ok)throw new Error(`HTTP ${r.status}`);const d=await r.json();return Array.isArray(d)?d:[];}
async function chiSQL(sql){return jfetch(`${CHI}.json?sql=${encodeURIComponent(sql)}&_shape=array`);}
function initials(n){return(n||'?').split(/[\s,]+/).filter(Boolean).slice(0,2).map(w=>w[0]).join('').toUpperCase();}
function fmtDate(s){if(!s)return'—';try{return new Date(s).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}catch{return s;}}

boot();
